<!DOCTYPE html>
<html>
<head>
<title>coolsite.io</title>
<link rel="icon" href="image/cursorB1.jpg">

<style>
body {
  margin: 0;
  min-height: 100vh;

  background-image: url("gif/peak.gif");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  display: flex;
  justify-content: center;
  align-items: center;
}

#menu {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

#centeredButton,
#shop,
#update,
#playMusic {
  width: 250px;
  height: 70px;

  border: none;
  border-radius: 15px;

  font-size: 24px;
  color: white;
  text-decoration: none;
  text-align: center;
  line-height: 70px;

  box-shadow: 5px 5px 10px gray;

  transition: 0.3s;
}

#centeredButton {
  background: linear-gradient(to bottom, yellow, orange, red);
}

#shop {
  background: linear-gradient(to top, yellow, orange, red);
}

#update {
  background: linear-gradient(to top, red, black, red);
}

#playMusic {
  background: linear-gradient(to bottom, purple, pink);
  cursor: pointer;
}

#centeredButton:hover,
#shop:hover,
#update:hover,
#playMusic:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<div id="menu">
  <a href="game.html" id="centeredButton">Play</a>

  <button id="shop">Shop (Soon)</button>

  <a href="updatecredits.html" id="update">Update/Credits</a>

  <button id="playMusic">Play Music</button>
</div>

<audio id="music" src="gr0za-car-edit-editing-music-503357.mp3" loop></audio>

<script>
const music = document.getElementById("music");

document.getElementById("playMusic").addEventListener("click", function () {
  music.play();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>coolsite.io</title>
<link rel="icon" href="image/cursorB1.jpg">

<style>
body {
  margin: 0;
  min-height: 100vh;
  background-image: url("gif/peak.gif");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}


#centeredButton {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  display: inline-block;
  width: 200px;
  height: 60px;
  line-height: 60px;
  text-align: center;

  font-size: 24px;
  text-decoration: none;
  color: white;

  background: linear-gradient(to bottom, yellow, orange, red);
  border-radius: 15px;
  box-shadow: 5px 5px 10px gray;

  transition: 0.3s;
}

#centeredButton:hover {
  transform: translate(-50%, -50%) scale(1.2);
}
   #shop {
  position: absolute;
  left: 50%;
  top: 500px;
  transform: translate(-50%, -50%);

  display: inline-block;
  width: 200px;
  height: 60px;
  line-height: 60px;
  text-align: center;

  font-size: 24px;
  text-decoration: none;
  color: white;

  background: linear-gradient(to top, yellow, orange, red);
  border-radius: 15px;
  box-shadow: 5px 5px 10px gray;

  transition: 0.3s;
}
#shop:hover {
transform: translate(-50%, -50%) scale(1.2);
}

   #update {
  position: absolute;
  left: 50%;
  top: 600px;
  transform: translate(-50%, -50%);

  display: inline-block;
  width: 200px;
  height: 60px;
  line-height: 60px;
  text-align: center;

  font-size: 24px;
  text-decoration: none;
  color: white;

  background: linear-gradient(to top, red, black, red);
  border-radius: 15px;
  box-shadow: 5px 5px 10px gray;

  transition: 0.3s;
}
#update:hover {
transform: translate(-50%, -50%) scale(1.2);
}
  
</style>
</head>

<body>

<a href="game.html" id="centeredButton">Play</a>

<audio id="music" src="songs/IMA ACT A DAMN FOOL.mp3" loop></audio>

<button id="playMusic">Play Music</button>
<a href="updatecredits.html" id="update">update/credits</a>
<script>
const music = document.getElementById("music");

document.getElementById("playMusic").addEventListener("click", function() {
  music.play();
});
</script>
  <button id="shop">shop(soon)</button>
</body>
</html>

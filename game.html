<!DOCTYPE html>
<html>

<head>
  <title>game place</title>
<link rel="icon" href="image/cursorB1.jpg">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-image: url("gif/B10.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    #pvp-button {
      position: absolute;
      left: 200px;
      top: 300px;
      width: 200px;
      height: 100px;
      font-size: 24px;
      background: linear-gradient(to bottom, orange, red);
      box-shadow: 5px 5px 10px gray;
       border: none;
  border-radius: 15px;
    }

  #ai-button {
  position: absolute;
  left: 960px;
  top: 300px;
  width: 200px;
  height: 100px;

  display: inline-block;
  line-height: 100px;
  text-align: center;
  text-decoration: none;

  color: black;

  font-size: 24px;
  background: linear-gradient(to bottom, blue, white);
  box-shadow: 5px 5px 10px gray;
  border-radius: 15px;
}
  #go-back {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  display: inline-block;
  width: 200px;
  height: 60px;
  line-height: 60px;

  text-align: center;
  text-decoration: none;
  color: white;

  background: linear-gradient(to bottom, yellow, orange, red);
  border-radius: 15px;
  box-shadow: 5px 5px 10px gray;

  padding: 0;
}
    #playMusic {
  position: absolute;
  left: 50%;
  bottom: 50px;
  transform: translateX(-50%);

  width: 200px;
  height: 60px;

  border: none;
  border-radius: 15px;

  font-size: 20px;

  background: linear-gradient(to bottom, purple, pink);
}
 #ai-button:hover {
  transform: scale(1.1);
}

#pvp-button:hover {
  transform: scale(1.1);
}

#playMusic:hover {
  transform: translateX(-50%) scale(1.1);
}

#go-back:hover {
  transform: translate(-50%, -50%) scale(1.1);
}
    #ai-button,
#pvp-button,
#go-back,
#playMusic {
  transition: 0.3s;
}
  </style>
</head>

<body>

 <button id="pvp-button">PVP(Coming Soon)</button>

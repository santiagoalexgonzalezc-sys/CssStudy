<!DOCTYPE html>
<html>

<head>
  <title>level and modes</title>
  <link rel="icon" href="image/cursorB1.jpg">
  <style>
  body {
      margin: 0;
      min-height: 100vh;
      background-image: url("cat.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    #easy {
      position: absolute;
      left: 250px;
      top: 500px;
      width: 200px;
      height: 100px;
      font-size: 24px;
      background: linear-gradient(to right, green, yellow);
      box-shadow: 5px 5px 10px gray;
       border: none;
  border-radius: 15px;
    }

    #medium {
      position: absolute;
      left: 450px;
      top: 500px;
      width: 200px;
      height: 100px;
      font-size: 24px;
      background: linear-gradient(to right, yellow, red);
      box-shadow: 5px 5px 10px gray;
       border: none;
  border-radius: 15px;
    }

    #hard {
      position: absolute;
      left: 550px;
      top: 500px;
      width: 200px;
      height: 100px;
      font-size: 24px;
      background: linear-gradient(to right, red, black);
      box-shadow: 5px 5px 10px gray;
       border: none;
  border-radius: 15px;
    }
    
    #headv1 {
      position: absolute;
      left: 300px;
      top: 150px;
      width: 350px;
      font-size: 30px;
      line-height: 1.5;
      color: white
    }
    #easy,
#medium,
#hard {
  transition: 0.3s;
}

#easy:hover,
#medium:hover,
#hard:hover {
  transform: scale(1.1);
}
  </style>
</head>

<body>
<button id="easy">easy</button>
<button id="medium">medium</button>
<button id="hard">hard</button>
<h1 id="headv1">more the difficulty more the glory</h1>  
</body>














  
</html>

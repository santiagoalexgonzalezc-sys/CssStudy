q<!DOCTYPE html>
<html>

<head>
  <title>level and modes</title>
  <link rel="icon" href="image/cursorB1.jpg">
 <style>
body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background-image: url("cat.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

#headv1 {
  color: white;
  font-size: 30px;
  margin-bottom: 100px;
  text-align: center;
}

#buttonContainer {
  display: flex;
  gap: 50px;
}

#easy,
#medium,
#hard {
  width: 200px;
  height: 100px;
  font-size: 24px;

  border: none;
  border-radius: 15px;
  box-shadow: 5px 5px 10px gray;

  transition: 0.3s;
}

#easy {
  background: linear-gradient(to right, green, yellow);
}

#medium {
  background: linear-gradient(to right, yellow, red);
}

#hard {
  background: linear-gradient(to right, red, black);
}

#easy:hover,
#medium:hover,
#hard:hover {
  transform: scale(1.1);
}
</style>

<body>
  <h1 id="headv1">more the difficulty more the glory</h1>

  <div id="buttonContainer">
    <button id="easy">easy</button>
    <a href="ai.html" id="medium">medium</a>
    <button id="hard">hard</button>
    <a href="game.html" id="dih">back</a>

  </div>
</body>














  
</html>
